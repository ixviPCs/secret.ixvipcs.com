<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; }
        
        /* The Container */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* The Game Area */
        iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
        }

        /* The Footer Bar */
        .footer {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #555;
            background: #f1f1f1;
            border-top: 1px solid #ddd;
        }

        button {
            padding: 4px 10px;
            cursor: pointer;
            background: #555;
            color: white;
            border: none;
            border-radius: 4px;
        }
        
        button:hover { background: #000; }
    </style>
</head>
<body>

<div class="game-wrapper" id="gameContainer">
    <iframe id="dinoFrame" src="https://chromedino.com/" scrolling="no" loading="lazy"></iframe>
    
    <div class="footer">
        <div>
            Play provided by <a href="https://chromedino.com/" target="_blank" style="color: #000; text-decoration: none; font-weight: bold;">ChromeDino.com</a> 
            | Original by Google
        </div>
        <button onclick="toggleFullscreen()">Fullscreen</button>
    </div>
</div>

<script>
    function toggleFullscreen() {
        let elem = document.getElementById("gameContainer");
        if (!document.fullscreenElement) {
            elem.requestFullscreen().catch(err => {
                alert(`Error: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }
</script>

</body>
</html>
